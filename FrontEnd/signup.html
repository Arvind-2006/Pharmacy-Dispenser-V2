<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Patient sign up — AMDS</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 40px 36px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 440px;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      h2 {
        text-align: center;
        margin-bottom: 8px;
        color: #9b2d6b;
        font-size: 26px;
        font-weight: 700;
      }

      .subtitle {
        text-align: center;
        color: #666;
        font-size: 14px;
        margin-bottom: 28px;
      }

      .input-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        color: #555;
        margin-bottom: 6px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #eee;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        background-color: #fcfcfc;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: #bc13fe;
        box-shadow: 0 0 10px rgba(188, 19, 254, 0.25);
        background-color: #fff;
      }

      button[type="submit"] {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        background: linear-gradient(to right, #8a618f, #ff007f);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(255, 0, 127, 0.35);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 0, 127, 0.45);
      }

      #message {
        margin-top: 18px;
        font-size: 14px;
        font-weight: 600;
        text-align: center;
        min-height: 1.2em;
      }

      #message.error {
        color: #e11d48;
      }

      #message.success {
        color: #0d9488;
      }

      .footer-links {
        margin-top: 22px;
        text-align: center;
        font-size: 14px;
        color: #666;
      }

      .footer-links a {
        color: #ff007f;
        font-weight: 600;
        text-decoration: none;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Create account</h2>
      <p class="subtitle">Patient self-registration for AMDS</p>

      <form id="signupForm" novalidate>
        <div class="input-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required minlength="3" />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" />
        </div>
        <div class="input-group">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="input-group">
          <label for="age">Age (optional)</label>
          <input id="age" name="age" type="number" min="0" max="150" />
        </div>
        <div class="input-group">
          <label for="gender">Gender (optional)</label>
          <input id="gender" name="gender" type="text" autocomplete="sex" />
        </div>
        <div class="input-group">
          <label for="phone">Phone (optional)</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" />
        </div>
        <div class="input-group">
          <label for="address">Address (optional)</label>
          <input id="address" name="address" type="text" autocomplete="street-address" />
        </div>
        <button type="submit">Sign up</button>
      </form>

      <p id="message"></p>

      <div class="footer-links">
        <p>Already registered? <a href="login.html">Back to login</a></p>
      </div>
    </div>

    <script src="signup.js"></script>
  </body>
</html>
